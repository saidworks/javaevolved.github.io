  public class CallCFromJava {
      static { System.loadLibrary("strlen-jni"); }
      public static native long strlen(String s);
      public static void main(String[] args) {
          long ret = strlen("Bambi");
          System.out.println("Return value " + ret); // 5
      }
  }

