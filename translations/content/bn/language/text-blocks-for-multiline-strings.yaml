---
title: মাল্টিলাইন স্ট্রিংয়ের জন্য টেক্সট ব্লক (Text blocks for multiline strings)
oldApproach: স্ট্রিং কনক্যাটেনেশন (String Concatenation)
modernApproach: টেক্সট ব্লকস (Text Blocks)
summary: ট্রিপল-কোট টেক্সট ব্লক ব্যবহার করে মাল্টিলাইন স্ট্রিংগুলো স্বাভাবিকভাবে লিখুন।
explanation: টেক্সট ব্লকগুলো আপনাকে মাল্টিলাইন স্ট্রিংগুলো ঠিক যেভাবে দেখায় সেভাবেই লিখতে দেয়। কোট এস্কেপিং (escaping quotes) বা \n যোগ করার আর প্রয়োজন নেই। কম্পাইলার স্বয়ংক্রিয়ভাবে ইনসিডেন্টাল ইন্ডেন্টেশন (incidental indentation) সরিয়ে দেয়।
whyModernWins:
- icon: "📖"
  title: যেমন আছে পঠনযোগ্য (Readable as-is)
  desc: JSON, SQL, এবং HTML আপনার সোর্স কোডে বাস্তব JSON, SQL, এবং HTML-এর মতোই দেখায়।
- icon: "🚫"
  title: কোনো এস্কেপ হেল (No Escape Hell) নেই
  desc: এমবেডেড কোটগুলোতে ব্যাকস্ল্যাশ এস্কেপিংয়ের (backslash escaping) প্রয়োজন হয় না।
- icon: "📐"
  title: স্মার্ট ইন্ডেন্টেশন (Smart Indentation)
  desc: ক্লোজিং ডিলিমিটার পজিশনের (closing delimiter position) উপর ভিত্তি করে লিডিং হোয়াইটস্পেস (leading whitespace) স্বয়ংক্রিয়ভাবে ছাঁটা হয়।
support:
  description: JDK 15 (সেপ্টেম্বর 2020) থেকে ব্যাপকভাবে উপলব্ধ