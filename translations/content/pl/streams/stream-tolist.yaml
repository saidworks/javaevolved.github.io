title: Stream.toList()
oldApproach: Collectors.toList()
modernApproach: .toList()
summary: Terminalne toList() zastępuje rozwlekłe collect(Collectors.toList()).
explanation: Stream.toList() zwraca niemodyfikowalną listę. Jest równoważne .collect(Collectors.toUnmodifiableList()) ale znacznie krótsze. Uwaga — wynik jest niemutowalny, w przeciwieństwie do Collectors.toList().
