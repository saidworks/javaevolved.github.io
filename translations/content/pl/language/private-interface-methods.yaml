  - icon: "🔐"
    title: Enkapsulacja
    desc: Szczegóły implementacji pozostają ukryte przed klasami implementującymi.
  - icon: "🧹"
    title: Interfejsy DRY
    desc: Koniec z kopiuj-wklej między metodami domyślnymi.
