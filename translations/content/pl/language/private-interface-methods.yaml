title: Prywatne metody interfejsów
oldApproach: Powielona logika
modernApproach: Metody prywatne
summary: Wyodrębnij współdzieloną logikę w interfejsach używając metod prywatnych.
explanation: Java 9 umożliwia prywatne metody w interfejsach, co pozwala współdzielić kod między metodami domyślnymi bez ujawniania szczegółów implementacji klasom implementującym.
whyModernWins:
